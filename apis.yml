aid: amazon-medialive
name: Amazon MediaLive
description: >-
  AWS Elemental MediaLive is a broadcast-grade live video processing service
  that creates high-quality video streams for delivery to broadcast TVs and
  internet-connected multiscreen devices. It allows you to create live streams
  from various sources and deliver them to viewers anywhere.
